name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  push:
    branches: ["main"]
    # Publish semver tags as releases.
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  build:
    runs-on: self-hosted

    # Two srunner flavors shipped as separate image tags:
    #   :main   → derekwuchengyu fork (matches the existing DB row)
    #   :native → upstream carla-simulator/scenario_runner (powers
    #             simulator id=3 native-carla after the DB update)
    # Matrix entries share buildx + login steps; only the build-arg
    # (SRUNNER_GIT) and the resulting tag differ.
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: main
            srunner_git: https://github.com/derekwuchengyu/scenario_runner.git
            with_catalogs: "1"
          - flavor: native
            srunner_git: https://github.com/carla-simulator/scenario_runner.git
            # Upstream srunner doesn't ship the fork's example Catalogs.
            with_catalogs: "0"

    env:
      # <dockerhub-namespace>/<repo-name>; namespace comes from the
      # DOCKERHUB_USERNAME secret so the workflow works across forks.
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}

    permissions:
      contents: read
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: "v2.2.4"

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Single source of truth for both the docker image tag and the SIF
      # tag, per matrix flavor. On main branch builds the tag is just the
      # flavor name (`:main`, `:native`) — what the DB rows reference. On
      # any other ref (feature branch, tag push, PR) we slugify ref_name
      # and suffix it so per-branch builds don't collide on the registry.
      - name: Compute image tag
        id: tag
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            tag="$FLAVOR"
          else
            slug=$(echo '${{ github.ref_name }}' | sed -E 's|[^A-Za-z0-9._-]|-|g')
            tag="$FLAVOR-$slug"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Image tag: $tag"

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          # Override metadata-action's tags with the matrix-aware tag; keep
          # its labels (OCI annotations: source, revision, etc.).
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SRUNNER_GIT=${{ matrix.srunner_git }}
            WITH_CATALOGS=${{ matrix.with_catalogs }}
          # Buildcache push needs registry auth (skipped on PR runs) and must
          # be scoped per flavor — otherwise the matrix entries trash each
          # other's cache since their layer graphs diverge at the srunner ADD.
          cache-from: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache-{2}', env.REGISTRY, env.IMAGE_NAME, matrix.flavor) || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache-{2},mode=max', env.REGISTRY, env.IMAGE_NAME, matrix.flavor) || '' }}

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      # ─── Apptainer SIF build + push (oras://docker.io/<ns>/<repo>-sif) ─
      # Builds the SIF from the docker image we just pushed (pinned by
      # digest so we ship the exact bits), then pushes to a SIF-specific
      # Docker Hub repo. Self-hosted runner is assumed to have apptainer
      # pre-installed (controller node ships with it for the existing
      # ansible flow).
      - name: Build and push Apptainer SIF
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          set -euo pipefail
          SIF_REPO="$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-sif' | tr '[:upper:]' '[:lower:]')"
          DOCKER_PINNED="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

          cat > apptainer.def <<EOD
          Bootstrap: docker
          From: ${DOCKER_PINNED}

          %startscript
          #!/bin/bash
          bash /app/entrypoint.sh
          EOD

          # Reuse the docker config that docker/login-action populated for the
          # image push — apptainer's own `registry login` / `remote login` don't
          # propagate creds to the OCI push code path on Docker Hub. Setting
          # REGISTRY_AUTH_FILE makes the containers/image library that apptainer
          # delegates to look at the same file the docker push used.
          export REGISTRY_AUTH_FILE="${DOCKER_CONFIG:-$HOME/.docker}/config.json"

          # 3 retries: the OCI layer fetch can hit transient
          # `connection reset by peer` on the multi-GB layers.
          # Apptainer's OCI cache keeps already-fetched layers
          # across attempts, so retries are cheap.
          for attempt in 1 2 3; do
            if apptainer build wrapper.sif apptainer.def; then
              break
            fi
            echo "apptainer build attempt $attempt failed; retrying"
            sleep 5
            [ "$attempt" = "3" ] && exit 1
          done

          # Mirror the docker image tag so consumers can pair them by name:
          # `:main` docker image ↔ `:main` SIF, `:native` ↔ `:native`, etc.
          # No `:latest` alias — with multiple flavors, latest is ambiguous;
          # per-flavor stable tags are the canonical name.
          REF_TAG="${{ steps.tag.outputs.tag }}"
          apptainer push wrapper.sif "oras://${SIF_REPO}:${REF_TAG}"
          echo "SIF pushed: oras://${SIF_REPO}:${REF_TAG}"
