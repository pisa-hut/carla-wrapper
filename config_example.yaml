# Example Carla Wrapper configuration.
#
# Keep this file as a flat key/value mapping if it is loaded directly into
# InitRequest.config. Missing keys use the defaults in simulation.DEFAULT_CONFIG.

# -----------------------------------------------------------------------------
# CARLA world execution
# -----------------------------------------------------------------------------

# Enable CARLA synchronous mode for deterministic stepping.
# Recommended for simulator API usage because step() drives the world tick.
synchronous_mode: true

# Disable rendering on the CARLA server side.
# Use true for faster headless runs when camera/display rendering is not needed.
no_rendering_mode: true

# Record the simulation to carla_recording.log via the CARLA recorder.
# Set true to enable recording (writes carla_recording.log).
record: false

# Select who loads the map for open_scenario1 scenarios.
# - scenario_runner: preserve ScenarioRunner's native LogicFile loading behavior.
# - wrapper: generate /mnt/map/xodr/<ScenarioPackData.map_name>.xodr with
#   wall_height=0.0 before parsing the OpenSCENARIO file. ScenarioRunner is then
#   allowed to verify the map but not replace the world. The first reset after
#   init generates it; later resets reuse it only after verifying the current
#   OpenDRIVE content.
open_scenario_map_loader: scenario_runner

# -----------------------------------------------------------------------------
# Coordinate convention
# -----------------------------------------------------------------------------

# Multiplier applied to lateral/yaw-related values when converting between the
# external simulator API convention and CARLA. Keep 1.0 unless your caller uses
# the opposite Y/yaw convention.
yaw_sign: -1.0

# Constant yaw offset, in degrees, applied during heading conversion.
# Keep 0.0 unless integrating with a coordinate frame that has a fixed heading
# offset relative to CARLA.
yaw_offset_deg: 0.0

# -----------------------------------------------------------------------------
# CARLA connection retry
# -----------------------------------------------------------------------------

# Total number of seconds init() will spend retrying the CARLA connection before
# raising a connection timeout.
carla_connect_timeout_seconds: 40

# Seconds to sleep between CARLA connection attempts during init().
retry_interval_seconds: 2

# -----------------------------------------------------------------------------
# TrafficManager
# -----------------------------------------------------------------------------

# Random seed passed to CARLA TrafficManager when ScenarioRunner is started.
# Use a fixed value for reproducible traffic behavior.
scenario_runner_tm_seed: 0

# -----------------------------------------------------------------------------
# Output kinematic filtering
# -----------------------------------------------------------------------------

# Speeds with absolute value at or below this threshold, in m/s, are reported as
# zero. This filters CARLA near-zero physics jitter that can keep downstream
# planners in a moving state after the vehicle has effectively stopped.
kinematic_speed_deadband_mps: 0.02

# Longitudinal accelerations with absolute value at or below this threshold, in
# m/s^2, are reported as zero. This is useful because tiny velocity jitter is
# amplified when acceleration is derived from tick-to-tick differences.
kinematic_acceleration_deadband_mps2: 0.15

# Yaw rates with absolute value at or below this threshold, in rad/s, are
# reported as zero.
kinematic_yaw_rate_deadband_radps: 0.003

# Yaw accelerations with absolute value at or below this threshold, in rad/s^2,
# are reported as zero.
kinematic_yaw_acceleration_deadband_radps2: 0.1

# -----------------------------------------------------------------------------
# Ackermann control
# -----------------------------------------------------------------------------

# Use CARLA's native VehicleAckermannControl backend for ACKERMANN commands.
# When false, the wrapper converts target speed/steer into VehicleControl
# throttle, brake, and normalized steer.
ackermann_use_native_control: false

# Native CARLA Ackermann speed PID proportional gain.
ackermann_native_speed_kp: 0.10

# Native CARLA Ackermann speed PID integral gain.
ackermann_native_speed_ki: 0.0

# Native CARLA Ackermann speed PID derivative gain.
ackermann_native_speed_kd: 0.10

# Native CARLA Ackermann acceleration PID proportional gain.
ackermann_native_accel_kp: 0.01

# Native CARLA Ackermann acceleration PID integral gain.
ackermann_native_accel_ki: 0.0

# Native CARLA Ackermann acceleration PID derivative gain.
ackermann_native_accel_kd: 0.0

# Proportional gain used by the fallback VehicleControl backend to convert
# speed error into throttle.
ackermann_speed_kp: 0.5

# Minimum non-zero throttle used by the fallback VehicleControl backend when the
# target speed is positive and acceleration is requested.
ackermann_min_throttle: 0.2

# Maximum throttle used by the fallback VehicleControl backend.
ackermann_max_throttle: 0.75

# Current speed below this value, in m/s, is treated as zero for Ackermann
# control decisions. This filters low-speed CARLA physics noise.
ackermann_stop_speed_threshold: 0.25

# When current speed is below this value and the target speed is high enough,
# the fallback VehicleControl backend uses launch throttle to overcome static
# friction and make starts less sluggish.
ackermann_launch_speed_threshold: 0.1

# Minimum target speed, in m/s, required to use launch throttle.
ackermann_launch_target_threshold: 0.25

# Throttle used during fallback VehicleControl launch from near stop.
ackermann_launch_throttle: 0.45

# Proportional gain used by the fallback VehicleControl backend to convert
# overspeed into brake.
ackermann_brake_kp: 0.6

# Minimum non-zero brake used by the fallback VehicleControl backend while
# decelerating.
ackermann_min_brake: 0.15

# Maximum brake used by the fallback VehicleControl backend while decelerating.
ackermann_max_brake: 1.0

# Default acceleration value used for ACKERMANN commands when the payload omits
# "acceleration" and the target speed is not below current speed. Passed through
# to native Ackermann, and recorded in extras for the fallback backend.
ackermann_accel_default: 1.5

# Default deceleration magnitude, in m/s^2, used by native Ackermann when the
# payload omits "acceleration" and the target speed is below current speed. The
# wrapper sends this as a negative acceleration.
ackermann_decel_default: 4.0

# Default jerk value used for ACKERMANN commands when the payload omits "jerk".
# Used when the target speed is not below current speed.
ackermann_jerk_default: 0.0

# Default jerk used by native Ackermann when the payload omits "jerk" and the
# target speed is below current speed.
ackermann_brake_jerk_default: 8.0

# -----------------------------------------------------------------------------
# Related runtime environment variables
# -----------------------------------------------------------------------------
#
# These are not read from InitRequest.config, so they are documented here only.
# Set them in the process/container environment instead of enabling them as YAML
# config keys.
#
# CARLA_HOST=localhost    # CARLA RPC host used by the wrapper.
# CARLA_PORT=2000         # CARLA RPC/server port.
# CARLA_TM_PORT=8000      # TrafficManager port used by ScenarioRunner.
# CARLA_TIMEOUT=30        # CARLA client RPC timeout in seconds.
